project:
  name: Example
  database: PostgreSQL
  extensionSchema: extensions
  staging:
    - staging
  dbdocs:
    base:
      exclude:
        schemas:
          - staging
          - migrate
          - extensions
    core:
      include:
        schemas:
          - config
schemas:
  - config
  - extensions
  - staging
  - migrate

extensions:
  - uuid-ossp

roles:
  - name: advanced
    refers:
      - basic
  - name: basic

import:
  options:
    truncate: true
    nullValue: ''
  tables:
    - staging.lookup_values:
        env: [dev, prod]
    - staging.dev_fixture_table:
        env: dev
  after:
    - import/loader.sql
  after.dev:
    - import/dev_loader.sql
  after.prod:
    - import/prod_loader.sql

export:
  - config.lookups
  - config.lookup_values
  - config.genders
  - migrate.lookup_values
