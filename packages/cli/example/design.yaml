project:
  name: Example
  database: PostgreSQL
  extensionSchema: extensions
  staging:
    - staging
  dbdocs:
    base:
      exclude:
        schemas:
          - staging
          - migrate
          - extensions
    core:
      include:
        schemas:
          - config
schemas:
  - config:
      grants:
        anon: [usage, select]
        authenticated: [usage, select]
        service_role: [usage, all]
  - extensions
  - staging
  - migrate

extensions:
  - uuid-ossp

roles:
  - name: advanced
    refers:
      - basic
  - name: basic

import:
  options:
    truncate: true
    nullValue: ''
  tables:
    - staging.lookup_values:
        env: [dev, prod]
    - staging.dev_fixture_table:
        env: dev

export:
  - config.lookups
  - config.lookup_values
  - config.genders
  - migrate.lookup_values
